# NightOwl — PostgreSQL configuration optimized for write-heavy monitoring workload
#
# Key optimizations:
# - synchronous_commit = off: Don't wait for WAL flush (agent already buffers in SQLite)
# - Large WAL and checkpoint settings: Reduce checkpoint frequency under sustained writes
# - Aggressive autovacuum: Keep tables healthy under constant inserts

# Connection
listen_addresses = '*'
max_connections = 100

# WAL & Durability — optimized for write throughput
# The agent's SQLite buffer provides crash safety, so we can trade
# PostgreSQL durability for speed without risking data loss.
synchronous_commit = off
wal_level = minimal
max_wal_senders = 0
wal_buffers = 64MB
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# Memory
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 64MB
maintenance_work_mem = 128MB

# Write performance
commit_delay = 100
commit_siblings = 5

# Autovacuum — aggressive for insert-heavy tables
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 2ms
autovacuum_max_workers = 3

# Logging (minimal for performance)
log_min_duration_statement = 1000
log_checkpoints = on
