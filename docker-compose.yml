# NightOwl monorepo — PostgreSQL + PgBouncer + agent daemon + api + web
#
# Usage:
#   cp .env.example .env   # first time only — shared nightowl DB creds/APP_KEY
#   docker compose up -d
#
# The nightowl DB credentials, APP_KEY, and dev URLs below come from this
# directory's .env (Compose loads it automatically for variable
# substitution — see .env.example). Fixed, non-secret dev/POC defaults;
# replace them in .env for anything shared or long-lived.
#
# Direct PostgreSQL (bypass PgBouncer):
#   psql -h 127.0.0.1 -p 5433 -U nightowl -d nightowl

services:
  postgres:
    # Explicit name (not the default compose-generated one): `supplycart-network`
    # is an external network shared with other local stacks (adam-app, hub-app,
    # ...), and at least one of them also names its Postgres service `postgres`.
    # Docker's embedded DNS then resolves the bare alias `postgres` to whichever
    # container claimed it, not necessarily this one — connections silently land
    # on the wrong Postgres instance. Referencing this fixed name elsewhere
    # (NIGHTOWL_DB_HOST below, pgbouncer.ini) avoids the collision.
    container_name: nightowl-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${NIGHTOWL_DB_DATABASE:-nightowl}
      POSTGRES_USER: ${NIGHTOWL_DB_USERNAME:-nightowl}
      POSTGRES_PASSWORD: ${NIGHTOWL_DB_PASSWORD:-nightowl}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - nightowl_data:/var/lib/postgresql/data
      # Only runs on first init of an empty volume — creates api's own
      # `nightowl_app` database alongside the agent's `nightowl` one, same
      # server/instance, separate schema/ownership.
      - ./docker/postgres/init-app-db.sql:/docker-entrypoint-initdb.d/init-app-db.sql:ro
    command: >
      postgres
      -c synchronous_commit=off
      -c max_wal_size=2GB
      -c wal_buffers=64MB
      -c shared_buffers=256MB
      -c work_mem=64MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightowl"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supplycart-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supplycart-network

  agent:
    container_name: nightowl-agent
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      APP_KEY: ${NIGHTOWL_APP_KEY:-base64:lOO9am44Du77Je2OPn8qquhmhc05wmAbsOoCvT6Bzd8=}
      # Direct to postgres, not pgbouncer: pgbouncer's transaction pooling mode
      # breaks the agent's COPY-based drain writes (SQLSTATE 25P02). Fine for
      # this POC's traffic volume; revisit pgbouncer if/when this scales up.
      NIGHTOWL_DB_HOST: nightowl-postgres
      NIGHTOWL_DB_PORT: 5432
      NIGHTOWL_DB_DATABASE: ${NIGHTOWL_DB_DATABASE:-nightowl}
      NIGHTOWL_DB_USERNAME: ${NIGHTOWL_DB_USERNAME:-nightowl}
      NIGHTOWL_DB_PASSWORD: ${NIGHTOWL_DB_PASSWORD:-nightowl}
    ports:
      # 2407 (TCP ingest) stays reachable from adam-app via the shared Docker
      # network regardless of this host-side mapping (container-to-container
      # traffic doesn't go through host port publishing). Loopback-only here
      # just prevents the raw ingest/health ports from being reachable off
      # this machine.
      - "127.0.0.1:2407:2407"
      - "127.0.0.1:2408:2408/udp"
      - "127.0.0.1:2409:2409"
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - supplycart-network

  api:
    container_name: nightowl-api
    build:
      context: .
      dockerfile: docker/Dockerfile
    # `php artisan serve` spawns its actual web server as a child process with
    # a stripped environment (custom env vars don't reach it, only what
    # Laravel's ServeCommand explicitly re-passes) — invoke PHP's built-in
    # server directly with Laravel's own router script instead, so this
    # container's PID 1 is the real server and inherits the full env. The
    # router script uses getcwd() to locate index.php, so the working
    # directory must actually be public/ (not just docroot via -t). Migrate
    # api's own schema (Postgres `nightowl_app` DB, see below) on boot.
    command: >
      sh -c "php artisan migrate --force &&
             cd public &&
             exec php -S 0.0.0.0:8000 ../vendor/laravel/framework/src/Illuminate/Foundation/resources/server.php"
    environment:
      APP_KEY: ${NIGHTOWL_APP_KEY:-base64:lOO9am44Du77Je2OPn8qquhmhc05wmAbsOoCvT6Bzd8=}
      FRONTEND_URLS: ${FRONTEND_URL:-http://localhost:5173}
      SANCTUM_STATEFUL_DOMAINS: localhost:5173
      SESSION_DOMAIN: localhost
      # Used to build links in outgoing mail/alerts (e.g. OrgInvitationReceived's
      # "Log in to respond" button) — defaults to the production dashboard
      # (config/nightowl.php) otherwise, which is wrong for local dev.
      NIGHTOWL_DASHBOARD_URL: ${FRONTEND_URL:-http://localhost:5173}
      # api's own schema (users, orgs, teams, apps, sessions, ...) — a
      # separate `nightowl_app` database on the SAME Postgres server as the
      # agent's `nightowl` telemetry DB below, not merged into it. Via
      # PgBouncer for the same reason as NIGHTOWL_DB_* below (per-request
      # connection churn).
      DB_CONNECTION: pgsql
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_DATABASE: nightowl_app
      DB_USERNAME: ${NIGHTOWL_DB_USERNAME:-nightowl}
      DB_PASSWORD: ${NIGHTOWL_DB_PASSWORD:-nightowl}
      # Via PgBouncer, not direct postgres: this container opens a fresh
      # connection per request (no persistent connection like the agent
      # daemon has), and direct connections showed intermittent SCRAM auth
      # failures under that churn. PgBouncer pooling is fine here since this
      # is read-mostly traffic, not the agent's COPY-based writes.
      NIGHTOWL_DB_HOST: pgbouncer
      NIGHTOWL_DB_PORT: 5432
      NIGHTOWL_DB_DATABASE: ${NIGHTOWL_DB_DATABASE:-nightowl}
      NIGHTOWL_DB_USERNAME: ${NIGHTOWL_DB_USERNAME:-nightowl}
      NIGHTOWL_DB_PASSWORD: ${NIGHTOWL_DB_PASSWORD:-nightowl}
      # Local dev: this container joins the external supplycart-network, which
      # already runs a shared Mailpit (SMTP catcher, web UI at
      # http://localhost:8025) for other projects on this machine — route
      # outgoing mail (e.g. OrgInvitationReceived) there instead of the log
      # driver so it's actually visible somewhere rather than buried in
      # storage/logs/laravel.log.
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      # Shared Mailpit requires auth (MP_SMTP_AUTH on that container) —
      # these are its fixed dev credentials, not a NightOwl-specific secret.
      MAIL_USERNAME: supplycart
      MAIL_PASSWORD: password
      MAIL_FROM_ADDRESS: noreply@nightowl.test
      MAIL_FROM_NAME: NightOwl
    ports:
      # Loopback-only: reachable from this machine, not the rest of the LAN.
      - "127.0.0.1:8000:8000"
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - supplycart-network

  web:
    container_name: nightowl-web
    build:
      context: ./web
      dockerfile: ../docker/Dockerfile.web
      args:
        VITE_API_URL: ${API_URL:-http://localhost:8000}
    ports:
      - "127.0.0.1:5173:4173"
    depends_on:
      - api
    networks:
      - supplycart-network

volumes:
  nightowl_data:

networks:
  supplycart-network:
    external: true
