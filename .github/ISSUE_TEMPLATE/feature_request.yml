name: Feature request
description: Suggest a new feature or improvement for the NightOwl agent.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. What are you trying to do today that's hard or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you envision this working? APIs, config keys, CLI flags, UI concepts — whatever applies.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or thought about, and why they weren't sufficient.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, relevant Nightwatch features, screenshots, etc.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This is for the open-source agent (not the hosted dashboard).
          required: true
        - label: I searched existing issues and this hasn't already been requested.
          required: true
