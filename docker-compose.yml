# NightOwl monorepo — PostgreSQL + PgBouncer + agent daemon + api + web
#
# Usage:
#   docker compose up -d
#
# .env config (host-side, only needed if you run things outside Docker too):
#   NIGHTOWL_DB_HOST=127.0.0.1
#   NIGHTOWL_DB_PORT=6432            # PgBouncer (pooled) — use for agent
#   NIGHTOWL_DB_DATABASE=nightowl
#   NIGHTOWL_DB_USERNAME=nightowl
#   NIGHTOWL_DB_PASSWORD=nightowl
#   NIGHTOWL_DRAIN_WORKERS=4         # Parallel drain workers
#
# Direct PostgreSQL (bypass PgBouncer):
#   psql -h 127.0.0.1 -p 5433 -U nightowl -d nightowl
#
# api/'s own APP_KEY below is a fixed dev-only value baked into this
# compose file (not secret-managed) — fine for local/POC use, replace it
# for anything shared or long-lived.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nightowl
      POSTGRES_USER: nightowl
      POSTGRES_PASSWORD: nightowl
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - nightowl_data:/var/lib/postgresql/data
    command: >
      postgres
      -c synchronous_commit=off
      -c max_wal_size=2GB
      -c wal_buffers=64MB
      -c shared_buffers=256MB
      -c work_mem=64MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightowl"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supplycart-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supplycart-network

  agent:
    container_name: nightowl-agent
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      APP_KEY: base64:lOO9am44Du77Je2OPn8qquhmhc05wmAbsOoCvT6Bzd8=
      # Direct to postgres, not pgbouncer: pgbouncer's transaction pooling mode
      # breaks the agent's COPY-based drain writes (SQLSTATE 25P02). Fine for
      # this POC's traffic volume; revisit pgbouncer if/when this scales up.
      NIGHTOWL_DB_HOST: postgres
      NIGHTOWL_DB_PORT: 5432
      NIGHTOWL_DB_DATABASE: nightowl
      NIGHTOWL_DB_USERNAME: nightowl
      NIGHTOWL_DB_PASSWORD: nightowl
    ports:
      # 2407 (TCP ingest) stays reachable from adam-app via the shared Docker
      # network regardless of this host-side mapping (container-to-container
      # traffic doesn't go through host port publishing). Loopback-only here
      # just prevents the raw ingest/health ports from being reachable off
      # this machine.
      - "127.0.0.1:2407:2407"
      - "127.0.0.1:2408:2408/udp"
      - "127.0.0.1:2409:2409"
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - supplycart-network

  api:
    container_name: nightowl-api
    build:
      context: .
      dockerfile: docker/Dockerfile
    # `php artisan serve` spawns its actual web server as a child process with
    # a stripped environment (custom env vars don't reach it, only what
    # Laravel's ServeCommand explicitly re-passes) — invoke PHP's built-in
    # server directly with Laravel's own router script instead, so this
    # container's PID 1 is the real server and inherits the full env. The
    # router script uses getcwd() to locate index.php, so the working
    # directory must actually be public/ (not just docroot via -t). Migrate
    # api's own (sqlite) schema on boot since the image ships without a
    # pre-populated database file.
    command: >
      sh -c "php artisan migrate --force &&
             cd public &&
             exec php -S 0.0.0.0:8000 ../vendor/laravel/framework/src/Illuminate/Foundation/resources/server.php"
    environment:
      APP_KEY: base64:lOO9am44Du77Je2OPn8qquhmhc05wmAbsOoCvT6Bzd8=
      FRONTEND_URLS: http://localhost:5173
      SANCTUM_STATEFUL_DOMAINS: localhost:5173
      SESSION_DOMAIN: localhost
      # Via PgBouncer, not direct postgres: this container opens a fresh
      # connection per request (no persistent connection like the agent
      # daemon has), and direct connections showed intermittent SCRAM auth
      # failures under that churn. PgBouncer pooling is fine here since this
      # is read-mostly traffic, not the agent's COPY-based writes.
      NIGHTOWL_DB_HOST: pgbouncer
      NIGHTOWL_DB_PORT: 5432
      NIGHTOWL_DB_DATABASE: nightowl
      NIGHTOWL_DB_USERNAME: nightowl
      NIGHTOWL_DB_PASSWORD: nightowl
    ports:
      # Loopback-only: reachable from this machine, not the rest of the LAN.
      - "127.0.0.1:8000:8000"
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - supplycart-network

  web:
    container_name: nightowl-web
    build:
      context: ./web
      dockerfile: ../docker/Dockerfile.web
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "127.0.0.1:5173:4173"
    depends_on:
      - api
    networks:
      - supplycart-network

volumes:
  nightowl_data:

networks:
  supplycart-network:
    external: true
