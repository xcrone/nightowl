[databases]
nightowl = host=nightowl-postgres port=5432 dbname=nightowl user=nightowl password=nightowl
nightowl_app = host=nightowl-postgres port=5432 dbname=nightowl_app user=nightowl password=nightowl

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
ignore_startup_parameters = extra_float_digits
admin_users = nightowl
