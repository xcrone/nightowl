name: Agent Tests

on:
  push:
    branches: [main, develop]
    paths: ['agent/**', '.github/workflows/agent-tests.yml']
  pull_request:
    branches: [main]
    paths: ['agent/**', '.github/workflows/agent-tests.yml']

defaults:
  run:
    working-directory: agent

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, pdo_pgsql, zlib
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite Unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nightowl_test
          POSTGRES_USER: nightowl_test
          POSTGRES_PASSWORD: test123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, pdo_pgsql, zlib
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run all tests (unit + integration)
        env:
          NIGHTOWL_TEST_DB_HOST: 127.0.0.1
          NIGHTOWL_TEST_DB_PORT: 5432
          NIGHTOWL_TEST_DB_DATABASE: nightowl_test
          NIGHTOWL_TEST_DB_USERNAME: nightowl_test
          NIGHTOWL_TEST_DB_PASSWORD: test123
        run: vendor/bin/phpunit
